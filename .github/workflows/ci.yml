name: ci

on:
  pull_request:
  push:
    branches: [development]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm check
      - name: Run tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Lesson translation coverage
        run: pnpm i18n:coverage
